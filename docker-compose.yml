# Closeli Remote Stream Server
#
# Connects directly to Closeli cloud relay servers to receive camera video.
# No LAN access to the camera needed - works from anywhere with internet.
# Cameras are auto-discovered from the account on startup.
#
# Usage:
#   docker compose up -d
#
# Endpoints:
#   http://localhost:8080/                    - Index (all cameras)
#   http://localhost:8080/video/<device_id>   - MJPEG stream
#   http://localhost:8080/audio/<device_id>   - Audio stream
#   http://localhost:8080/status              - All cameras status

services:
  closeli:
    build: .
    container_name: closeli-stream
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
